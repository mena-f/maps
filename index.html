<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Destination Map</title>
  <link rel="stylesheet" href="/static/style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <!-- Translations must load before the script block below -->
  <script src="/static/translations.js"></script>
</head>
<body>

  <!-- Full-screen map built by Folium in app.py; filled in by JS on load -->
  <div id="map-container"></div>
  <!-- Loading overlay shown while route is being calculated -->
  <div id="map-loading" class="hidden">
    <div class="loading-box">
      <i class="fa fa-spinner fa-spin"></i>
      <span id="txt-loading">Calculating route...</span>
    </div>
  </div>

  <!-- Floating note over the map (top-right) -->
  <div id="map-note">🌐 Map labels are shown in English regardless of selected language</div>

  <!-- Sidebar: bottom sheet on mobile, left panel on desktop -->
  <div id="sidebar">

    <!-- Tap this bar on mobile to collapse/expand the sidebar -->
    <div id="sheet-handle">
      <div class="handle-bar"></div>
    </div>

    <!-- Title, language picker, and theme toggle -->
    <div id="top-bar">
      <h1 id="txt-title"><i class="fa fa-map-location-dot"></i> Route Finder</h1>
      <div style="display:flex;gap:8px;align-items:center">
        <select id="lang-select" title="Language">
          <option value="en">🇺🇸 English</option>
          <option value="es">🇪🇸 Español</option>
          <option value="fr">🇫🇷 Français</option>
          <option value="ar">🇸🇦 العربية</option>
          <option value="eg">🇪🇬 مصري</option>
          <option value="zh">🇨🇳 中文</option>
          <option value="de">🇩🇪 Deutsch</option>
          <option value="pt">🇧🇷 Português</option>
          <option value="ja">🇯🇵 日本語</option>
          <option value="ko">🇰🇷 한국어</option>
          <option value="ru">🇷🇺 Русский</option>
          <option value="uk">🇺🇦 Українська</option>
        </select>
        <button id="theme-toggle" title="Toggle theme"><i class="fa fa-sun"></i></button>
      </div>
    </div>

    <!-- Origin address input with autocomplete -->
    <div class="input-group">
      <label id="txt-from"><i class="fa fa-circle-dot"></i> From</label>
      <input id="origin" type="text" placeholder="e.g. 123 Main St, Detroit" autocomplete="off"/>
      <ul id="origin-suggestions" class="suggestions hidden"></ul>
    </div>

    <!-- Optional stops between From and To. Starts with one faded placeholder row;
         typing into it activates it and spawns a fresh placeholder row underneath. -->
    <div id="stops-container"></div>

    <!-- Destination address input with autocomplete -->
    <div class="input-group">
      <label id="txt-to"><i class="fa fa-flag"></i> To</label>
      <input id="destination" type="text" placeholder="e.g. 456 Elm St, Ann Arbor" autocomplete="off"/>
      <ul id="destination-suggestions" class="suggestions hidden"></ul>
    </div>

    <!-- Driving / Walking / Cycling mode selector -->
    <div class="mode-toggle">
      <button class="mode-btn active" data-mode="driving"><i class="fa fa-car"></i> <span id="txt-driving">Driving</span></button>
      <button class="mode-btn" data-mode="walking"><i class="fa fa-person-walking"></i> <span id="txt-walking">Walking</span></button>
      <button class="mode-btn" data-mode="cycling"><i class="fa fa-bicycle"></i> <span id="txt-cycling">Cycling</span></button>
    </div>

    <button id="go-btn"><i class="fa fa-route"></i> <span id="txt-get-route">Get Route</span></button>
    <button id="clear-btn"><i class="fa fa-rotate-left"></i> <span id="txt-clear">Clear</span></button>

    <!-- Result stats — hidden until a route is returned -->
    <div id="result" class="hidden">
      <div class="stat"><i class="fa fa-road"></i> <span id="distance"></span> <button id="unit-toggle" class="unit-btn">km</button></div>
      <div class="stat"><i class="fa fa-clock"></i> <span id="duration"></span></div>
      <div id="alt-info" class="alt-info hidden"></div>

      <!-- Optional live GPS trip timer: off by default, opt-in per trip -->
      <label id="timer-toggle-label" class="timer-toggle">
        <input type="checkbox" id="timer-toggle"/>
        <span id="txt-live-timer">Live trip timer</span>
      </label>
      <div id="timer-box" class="hidden">
        <i class="fa fa-stopwatch"></i> <span id="timer-display">--:--</span>
      </div>
      <div id="timer-error" class="hidden"></div>
    </div>

    <div id="error-msg" class="hidden"></div>
  </div>

  <script>
    // ── App state ──
    let mode = "driving", useKm = false, distKm, distMi, currentLang = "en";
    const chosen = {}; // Stores pre-resolved lat/lon when user picks an autocomplete suggestion

    // ── Optional live GPS trip timer (countdown to arrival) ──
    let timerInterval = null, watchId = null, remainingSeconds = 0, timerArrived = false;
    let destCoords = null, lastDurationSeconds = null;
    const timerToggle  = document.getElementById("timer-toggle");
    const timerBox     = document.getElementById("timer-box");
    const timerDisplay = document.getElementById("timer-display");
    const timerErrorEl = document.getElementById("timer-error");

    function haversineKm(lat1, lon1, lat2, lon2) {
      const R = 6371, toRad = d => d * Math.PI / 180;
      const dLat = toRad(lat2 - lat1), dLon = toRad(lon2 - lon1);
      const a = Math.sin(dLat / 2) ** 2 +
                Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function formatTimer(totalSeconds) {
      const sign = totalSeconds < 0 ? "+" : "";
      const abs = Math.abs(totalSeconds);
      const h = Math.floor(abs / 3600), m = Math.floor((abs % 3600) / 60), s = abs % 60;
      const mm = String(m).padStart(2, "0"), ss = String(s).padStart(2, "0");
      return sign + (h > 0 ? `${h}:${mm}:${ss}` : `${mm}:${ss}`);
    }

    function showTimerError(msg) {
      timerErrorEl.textContent = msg;
      timerErrorEl.classList.remove("hidden");
    }

    function clearTimerHandles() {
      if (timerInterval) clearInterval(timerInterval);
      if (watchId !== null) navigator.geolocation.clearWatch(watchId);
      timerInterval = null; watchId = null;
    }

    // Fully stops tracking. Pass true to also switch the toggle back off (e.g. on error or Clear).
    function stopTripTimer(resetToggle) {
      clearTimerHandles();
      timerBox.classList.add("hidden");
      timerErrorEl.classList.add("hidden");
      if (resetToggle) timerToggle.checked = false;
    }

    function updateTimerDisplay() {
      timerDisplay.textContent = formatTimer(remainingSeconds);
      timerDisplay.classList.toggle("overdue", remainingSeconds < 0);
    }

    // Starts (or restarts, for a freshly calculated route) the countdown + GPS watch.
    function startTripTimer() {
      clearTimerHandles();
      const t = TRANSLATIONS[currentLang];

      if (!window.isSecureContext) {
        showTimerError(t.needsHttps);
        timerToggle.checked = false;
        return;
      }
      if (!("geolocation" in navigator) || !destCoords || lastDurationSeconds == null) {
        showTimerError(t.geoDenied);
        timerToggle.checked = false;
        return;
      }

      remainingSeconds = lastDurationSeconds;
      timerArrived = false;
      timerErrorEl.classList.add("hidden");
      timerBox.classList.remove("hidden");
      updateTimerDisplay();

      timerInterval = setInterval(() => {
        if (timerArrived) return;
        remainingSeconds--;
        updateTimerDisplay();
      }, 1000);

      watchId = navigator.geolocation.watchPosition(
        pos => {
          if (timerArrived || !destCoords) return;
          const distToDest = haversineKm(
            pos.coords.latitude, pos.coords.longitude, destCoords.lat, destCoords.lon
          );
          if (distToDest < 0.075) { // Arrived: within ~75m of the destination
            timerArrived = true;
            clearTimerHandles();
            timerDisplay.textContent = t.arrived;
            timerDisplay.classList.remove("overdue");
          }
        },
        () => { showTimerError(t.geoDenied); stopTripTimer(true); },
        { enableHighAccuracy: true, maximumAge: 5000, timeout: 15000 }
      );
    }

    timerToggle.addEventListener("change", () => {
      if (timerToggle.checked) startTripTimer();
      else stopTripTimer(false);
    });

    // ── Load the default world map on first page load ──
    function loadDefaultMap() {
      fetch("/map").then(r => r.text()).then(html => {
        document.getElementById("map-container").innerHTML = html;
      });
    }
    loadDefaultMap();

    // ── Optional stops between From and To ──
    let stopCounter = 0;
    const chosenStops = {}; // stopId -> pre-resolved {label, lat, lon} from autocomplete

    function addStopRow(isPlaceholder) {
      const id = `stop-${stopCounter++}`;
      const container = document.getElementById("stops-container");

      const row = document.createElement("div");
      row.className = "input-group stop-row" + (isPlaceholder ? " stop-placeholder" : "");
      row.dataset.stopId = id;
      row.innerHTML = `
        <input type="text" class="stop-input" placeholder="${TRANSLATIONS[currentLang].addStop}" autocomplete="off"/>
        <button type="button" class="remove-stop hidden" title="Remove stop"><i class="fa fa-xmark"></i></button>
        <ul class="suggestions hidden"></ul>
      `;
      container.appendChild(row);

      const inp = row.querySelector(".stop-input");
      const list = row.querySelector(".suggestions");
      const removeBtn = row.querySelector(".remove-stop");
      let activated = !isPlaceholder;
      let timer;

      removeBtn.addEventListener("click", () => {
        delete chosenStops[id];
        row.remove();
      });

      inp.addEventListener("input", () => {
        chosenStops[id] = null; // Clear saved coords when user edits the field

        // First keystroke in a placeholder row activates it and spawns the next one
        if (!activated && inp.value.trim().length > 0) {
          activated = true;
          row.classList.remove("stop-placeholder");
          removeBtn.classList.remove("hidden");
          addStopRow(true);
        }

        clearTimeout(timer);
        const q = inp.value.trim();
        if (q.length < 3) { list.innerHTML = ""; list.classList.add("hidden"); return; }
        timer = setTimeout(async () => {
          try {
            const items = await fetch(`/suggest?q=${encodeURIComponent(q)}`).then(r => r.json());
            list.innerHTML = "";
            if (!items.length) { list.classList.add("hidden"); return; }
            items.forEach(item => {
              const li = document.createElement("li");
              li.textContent = item.label;
              li.onclick = () => {
                inp.value = item.label;
                chosenStops[id] = item;
                list.innerHTML = "";
                list.classList.add("hidden");
              };
              list.appendChild(li);
            });
            list.classList.remove("hidden");
          } catch { list.classList.add("hidden"); }
        }, 300);
      });

      inp.addEventListener("keydown", e => { if (e.key === "Enter") getRoute(); });
      document.addEventListener("click", e => {
        if (!inp.contains(e.target) && !list.contains(e.target)) list.classList.add("hidden");
      });
    }

    function resetStops() {
      document.getElementById("stops-container").innerHTML = "";
      Object.keys(chosenStops).forEach(k => delete chosenStops[k]);
      addStopRow(true);
    }
    resetStops(); // Start with one faded "+ Add a stop" row

    function collectStops() {
      const rows = document.querySelectorAll("#stops-container .stop-row");
      const out = [];
      rows.forEach(row => {
        const text = row.querySelector(".stop-input").value.trim();
        if (!text) return; // skip the still-empty trailing placeholder
        const c = chosenStops[row.dataset.stopId];
        out.push({ text, coords: c ? { lat: c.lat, lon: c.lon } : null });
      });
      return out;
    }

    // ── Clear / Reset button ──
    document.getElementById("clear-btn").addEventListener("click", () => {
      // Clear inputs
      document.getElementById("origin").value = "";
      document.getElementById("destination").value = "";
      // Clear saved autocomplete coords
      chosen.origin = null;
      chosen.destination = null;
      // Clear any added stops back to a single empty placeholder row
      resetStops();
      // Stop and hide the live trip timer, if it was running
      stopTripTimer(true);
      destCoords = null; lastDurationSeconds = null;
      // Hide results and errors
      document.getElementById("result").classList.add("hidden");
      document.getElementById("error-msg").classList.add("hidden");
      document.getElementById("alt-info").classList.add("hidden");
      // Reset distance/duration state
      distKm = null; distMi = null;
      // Reload default world map
      loadDefaultMap();
    });

    // ── Mobile bottom sheet: tap handle to open/close ──
    let sheetOpen = true;
    document.getElementById("sheet-handle").addEventListener("click", () => {
      sheetOpen = !sheetOpen;
      document.getElementById("sidebar").classList.toggle("collapsed", !sheetOpen);
    });

    // ── Language selector ──
    const langSelect = document.getElementById("lang-select");
    langSelect.addEventListener("change", () => applyLang(langSelect.value));

    function applyLang(code) {
      currentLang = code;
      const t = TRANSLATIONS[code];
      // Arabic/Egyptian: flip text direction inside sidebar only, not the whole page
      const isRTL = (code === "ar" || code === "eg");
      document.documentElement.lang = code;
      document.getElementById("sidebar").style.direction = isRTL ? "rtl" : "ltr";
      // Update all translatable UI text
      document.getElementById("txt-title").innerHTML  = `<i class="fa fa-map-location-dot"></i> ${t.title}`;
      document.getElementById("txt-from").innerHTML   = `<i class="fa fa-circle-dot"></i> ${t.from}`;
      document.getElementById("txt-to").innerHTML     = `<i class="fa fa-flag"></i> ${t.to}`;
      document.getElementById("origin").placeholder      = t.fromPH;
      document.getElementById("destination").placeholder = t.toPH;
      document.querySelectorAll(".stop-input").forEach(el => el.placeholder = t.addStop);
      document.getElementById("txt-live-timer").textContent = t.liveTimer;
      document.getElementById("txt-driving").textContent  = t.driving;
      document.getElementById("txt-walking").textContent  = t.walking;
      document.getElementById("txt-cycling").textContent  = t.cycling;
      document.getElementById("txt-get-route").textContent = t.getRoute;
      document.getElementById("unit-toggle").textContent  = useKm ? t.toggleKm : t.toggleMi;
      if (distKm != null) showDist();
    }

    // ── Travel mode buttons ──
    document.querySelectorAll(".mode-btn").forEach(b => b.addEventListener("click", () => {
      document.querySelectorAll(".mode-btn").forEach(x => x.classList.remove("active"));
      b.classList.add("active");
      mode = b.dataset.mode;
    }));

    // ── km / mi toggle ──
    document.getElementById("unit-toggle").addEventListener("click", () => {
      useKm = !useKm;
      document.getElementById("unit-toggle").textContent =
        useKm ? TRANSLATIONS[currentLang].toggleKm : TRANSLATIONS[currentLang].toggleMi;
      if (distKm != null) showDist();
    });

    function showDist() {
      const t = TRANSLATIONS[currentLang];
      document.getElementById("distance").textContent =
        useKm ? `${distKm} ${t.toggleKm}` : `${distMi} ${t.toggleMi}`;
    }

    // ── Autocomplete: fetch suggestions as the user types ──
    ["origin", "destination"].forEach(id => {
      const inp  = document.getElementById(id);
      const list = document.getElementById(`${id}-suggestions`);
      let timer;

      inp.addEventListener("input", () => {
        chosen[id] = null; // Clear saved coords when user edits the field
        clearTimeout(timer);
        const q = inp.value.trim();
        if (q.length < 3) { list.innerHTML = ""; list.classList.add("hidden"); return; }
        // Debounce: wait 300ms after user stops typing before hitting the API
        timer = setTimeout(async () => {
          try {
            const items = await fetch(`/suggest?q=${encodeURIComponent(q)}`).then(r => r.json());
            list.innerHTML = "";
            if (!items.length) { list.classList.add("hidden"); return; }
            items.forEach(item => {
              const li = document.createElement("li");
              li.textContent = item.label;
              li.onclick = () => {
                inp.value = item.label;
                chosen[id] = item; // Save lat/lon so /route skips geocoding
                list.innerHTML = "";
                list.classList.add("hidden");
              };
              list.appendChild(li);
            });
            list.classList.remove("hidden");
          } catch { list.classList.add("hidden"); }
        }, 300);
      });

      inp.addEventListener("keydown", e => { if (e.key === "Enter") getRoute(); });
      // Close dropdown when clicking anywhere else
      document.addEventListener("click", e => {
        if (!inp.contains(e.target) && !list.contains(e.target)) list.classList.add("hidden");
      });
    });

    // ── Route fetch: sends inputs to Flask, gets back map HTML + stats ──
    document.getElementById("go-btn").addEventListener("click", getRoute);

    async function getRoute() {
      const t   = TRANSLATIONS[currentLang];
      const o   = document.getElementById("origin").value.trim();
      const d   = document.getElementById("destination").value.trim();
      const err = document.getElementById("error-msg");
      err.classList.add("hidden");
      document.getElementById("result").classList.add("hidden");

      if (!o || !d) { showErr(t.errBoth); return; }

      const btn = document.getElementById("go-btn");
      const loader = document.getElementById("map-loading");
      btn.disabled = true;
      btn.innerHTML = `<i class="fa fa-spinner fa-spin"></i> ${t.routing}`;
      loader.classList.remove("hidden");

      try {
        const res = await fetch("/route", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({
            origin: o, destination: d, mode,
            origin_coords: chosen.origin,           // Pass pre-resolved coords if available
            destination_coords: chosen.destination,
            stops: collectStops()                   // Any stops added between From and To, in order
          })
        });
        const data = await res.json();
        if (!res.ok) { showErr(data.error || t.errGeneric); return; }

        // Replace map iframe with the newly rendered route map
        document.getElementById("map-container").innerHTML = data.map_html;
        distKm = data.distance_km;
        distMi = data.distance_mi;
        showDist();

        const h = Math.floor(data.duration_min / 60), m = data.duration_min % 60;
        document.getElementById("duration").textContent = h ? `${h} hr ${m} min` : `${m} min`;

        // Keep the live trip timer in sync with whatever route was just calculated
        destCoords = data.destination;
        lastDurationSeconds = Math.round(data.duration_min * 60);
        if (timerToggle.checked) startTripTimer(); // Restart fresh for the new route

        const alt = document.getElementById("alt-info");
        if (data.alt_count > 0) {
          alt.textContent = t.altRoute(data.alt_count);
          alt.classList.remove("hidden");
        } else alt.classList.add("hidden");

        document.getElementById("result").classList.remove("hidden");
      } catch {
        showErr(TRANSLATIONS[currentLang].errNetwork);
      } finally {
        btn.disabled = false;
        btn.innerHTML = `<i class="fa fa-route"></i> ${TRANSLATIONS[currentLang].getRoute}`;
        loader.classList.add("hidden");
      }
    }

    // ── Dark / Light theme toggle ──
    let isDark = true;
    const themeBtn = document.getElementById("theme-toggle");

    function applyTheme() {
      if (isDark) {
        document.body.classList.remove("light");
        themeBtn.innerHTML = '<i class="fa fa-sun"></i>';  // Sun icon = click to go light
      } else {
        document.body.classList.add("light");
        themeBtn.innerHTML = '<i class="fa fa-moon"></i>'; // Moon icon = click to go dark
      }
    }

    themeBtn.addEventListener("click", () => { isDark = !isDark; applyTheme(); });
    applyTheme(); // Set initial theme on page load

    function showErr(msg) {
      const el = document.getElementById("error-msg");
      el.textContent = msg;
      el.classList.remove("hidden");
    }
  </script>
</body>
</html>
